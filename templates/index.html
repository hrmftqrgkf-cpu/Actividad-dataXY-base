<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
<meta http-equiv="refresh" content="2">
    <title>Estacionamiento Inteligente</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111827;
            color: white;
            text-align: center;
            margin: 0;
            padding: 30px;
        }

        .card {
            background: #1f2937;
            padding: 25px;
            border-radius: 15px;
            max-width: 650px;
            margin: auto;
        }

        h1 {
            color: #38bdf8;
        }

        h1 span{
    color:#ff4d4d;
}

.card{
    box-shadow:0 0 35px rgba(56,189,248,.20);
    border:1px solid rgba(56,189,248,.20);
}

.botones a{
    transition:.25s;
    font-weight:bold;
}

.botones a:hover{
    transform:scale(1.05);
    filter:brightness(1.15);
}
            font-size: 28px;
            margin: 20px;
            font-weight: bold;
        }

        .botones a {
            display: block;
            margin: 12px auto;
            padding: 15px;
            width: 230px;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 18px;
        }

        .disponible { background: #16a34a; }
        .reservado { background: #ca8a04; }
        .ocupado {
    background: #dc2626;
    grid-column: 1 / 3;
    justify-self: center;
}
        .mantenimiento { background: #2563eb; }

       .terminal {
            margin-top: 25px;
            background: black;
            color: #22c55e;
            text-align: left;
            padding: 15px;
            border-radius: 10px;
            height: 180px;
            overflow-y: auto;
            font-family: monospace;
        }
.estado small{
    font-size:14px;
    letter-spacing:3px;
    color:#cbd5e1;
}

.estado strong{
    display:block;
    font-size:34px;
    color:white;
    margin-top:10px;
    margin-bottom:20px;
}

.botones{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-top:20px;
}

.botones a{
    display:block;
    padding:18px;
    border-radius:14px;
    text-decoration:none;
    color:white;
    font-weight:bold;
    transition:0.25s;
}

.botones a:hover{
    transform:scale(1.05);
    filter:brightness(1.15);
}   
.card p{
    display:none;
}

.pantalla-estado{
    margin:20px auto 25px;
    padding:22px;
    max-width:420px;
    border-radius:18px;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    border:1px solid rgba(56,189,248,.35);
    box-shadow:0 0 30px rgba(56,189,248,.25);
    font-size:38px;
    font-weight:bold;
    color:white;
}
 </style>
</head>
<body>

    <div class="card">
        <h1>Smart Parking <span>INACAP</span></h1>


        <div class="estado">
    <small>ESTADO ACTUAL</small>
    <div class="pantalla-estado">
        {{ estado }}
    </div>
</div>

        <div class="botones">
            <a class="disponible" href="/disponible">Disponible</a>
            <a class="reservado" href="/reservado">Reservado</a>
            <a class="ocupado" href="/ocupado">Ocupado</a>
        </div>

        <!-- Historial oculto para el usuario -->
    </div>

</body>
</html>
